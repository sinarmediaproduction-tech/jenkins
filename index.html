<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Home Monitoring Dashboard - Demo</title>
    <style>
        /* ==================== RESET & GLOBAL ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: auto;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            background-image:
                radial-gradient(circle at 15% 10%, rgba(0, 150, 255, 0.06), transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(0, 255, 136, 0.04), transparent 40%);
            color: #e8edf5;
        }

        /* ==================== FULL-SCREEN GRID SHELL ==================== */
        .dashboard {
            min-height: 100vh;
            width: 100vw;
            display: grid;
            grid-template-rows: auto 1fr;
            padding: clamp(8px, 0.8vw, 14px);
            gap: clamp(12px, 1.2vw, 20px);
        }

        /* ==================== HEADER ==================== */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: clamp(10px, 1vw, 16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
            gap: 10px;
        }

        .dashboard-header h1 {
            color: #e8edf5;
            font-size: clamp(18px, 1.8vw, 28px);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .dashboard-header h1 span {
            color: #00d4ff;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: clamp(16px, 2vw, 36px);
            flex-wrap: wrap;
        }

        .clock {
            color: #8899bb;
            font-family: 'Courier New', monospace;
            font-size: clamp(13px, 1vw, 16px);
            letter-spacing: 0.5px;
        }

        .clock span {
            color: #e8edf5;
            font-weight: 600;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8899bb;
            font-size: clamp(12px, 0.9vw, 14px);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            animation: blink 1.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ==================== MAIN CONTENT ==================== */
        .main-content {
            display: grid;
            grid-template-columns: 1fr minmax(240px, 17vw);
            gap: clamp(8px, 0.8vw, 14px);
            align-items: start;
        }

        /* ==================== FLOORPLAN CONTAINER ==================== */
        .floorplan-container {
            position: relative;
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #0a0e17;
            aspect-ratio: 28233.56 / 40606.29;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ==================== GRID BACKGROUND ==================== */
        .grid-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.08) 1px, transparent 1px),
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size:
                10% 10%,
                10% 10%,
                2% 2%,
                2% 2%;
            background-position:
                0 0, 0 0,
                0 0, 0 0;
            pointer-events: none;
        }

        .grid-coords {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            font-family: 'Courier New', monospace;
            font-size: clamp(8px, 0.6vw, 11px);
            color: rgba(0, 212, 255, 0.25);
        }

        .grid-coords .x-label {
            position: absolute;
            transform: translateX(-50%);
            top: 4px;
        }
        .grid-coords .y-label {
            position: absolute;
            transform: translateY(-50%);
            left: 4px;
        }
        .grid-coords .x-label:nth-child(1) { left: 5%; }
        .grid-coords .x-label:nth-child(2) { left: 15%; }
        .grid-coords .x-label:nth-child(3) { left: 25%; }
        .grid-coords .x-label:nth-child(4) { left: 35%; }
        .grid-coords .x-label:nth-child(5) { left: 45%; }
        .grid-coords .x-label:nth-child(6) { left: 55%; }
        .grid-coords .x-label:nth-child(7) { left: 65%; }
        .grid-coords .x-label:nth-child(8) { left: 75%; }
        .grid-coords .x-label:nth-child(9) { left: 85%; }
        .grid-coords .x-label:nth-child(10) { left: 95%; }
        .grid-coords .y-label:nth-child(11) { top: 5%; }
        .grid-coords .y-label:nth-child(12) { top: 15%; }
        .grid-coords .y-label:nth-child(13) { top: 25%; }
        .grid-coords .y-label:nth-child(14) { top: 35%; }
        .grid-coords .y-label:nth-child(15) { top: 45%; }
        .grid-coords .y-label:nth-child(16) { top: 55%; }
        .grid-coords .y-label:nth-child(17) { top: 65%; }
        .grid-coords .y-label:nth-child(18) { top: 75%; }
        .grid-coords .y-label:nth-child(19) { top: 85%; }
        .grid-coords .y-label:nth-child(20) { top: 95%; }

        /* ==================== SVG OVERLAY ==================== */
        .floorplan-container svg {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: block;
            opacity: 0.72;
            transition: opacity 0.3s;
        }
        .floorplan-container:hover svg {
            opacity: 0.92;
        }

        /* ==================== SENSOR DOT ==================== */
        .sensor-dot {
            position: absolute;
            z-index: 10;
            width: clamp(18px, 1.6vw, 28px);
            height: clamp(18px, 1.6vw, 28px);
            border-radius: 50%;
            background: #1a3a2a;
            border: 2.5px solid rgba(0, 255, 136, 0.2);
            transform: translate(-50%, -50%);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .sensor-dot::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s;
        }

        .sensor-dot .sensor-tooltip {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: clamp(9px, 0.7vw, 11px);
            color: #c5cfe0;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sensor-dot:hover .sensor-tooltip {
            opacity: 1;
            bottom: calc(100% + 16px);
        }

        .sensor-coord {
            position: absolute;
            z-index: 9;
            font-family: 'Courier New', monospace;
            font-size: clamp(7px, 0.5vw, 9px);
            color: rgba(255, 255, 255, 0.15);
            pointer-events: none;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.3);
            padding: 1px 4px;
            border-radius: 3px;
            white-space: nowrap;
        }

        .sensor-dot.idle {
            background: #1a5a3a;
            border-color: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }
        .sensor-dot.idle::before {
            border-color: rgba(0, 255, 136, 0.05);
        }
        .sensor-dot.active {
            background: #ff3344;
            border-color: rgba(255, 51, 68, 0.8);
            animation: pulse-wave 1.8s ease-out infinite;
            box-shadow: 0 0 40px rgba(255, 51, 68, 0.4);
        }
        .sensor-dot.active::before {
            border-color: rgba(255, 51, 68, 0.3);
            animation: pulse-ring 1.8s ease-out infinite;
        }
        .sensor-dot.offline {
            background: #333;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: none;
            opacity: 0.4;
        }
        .sensor-dot.offline::before {
            display: none;
        }

        @keyframes pulse-wave {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px rgba(255, 51, 68, 0.5); }
            50% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 50px rgba(255, 51, 68, 0.7); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px rgba(255, 51, 68, 0.5); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: clamp(10px, 1vw, 16px);
            position: sticky;
            top: clamp(14px, 1.4vw, 26px);
            align-self: start;
        }

        .panel {
            background: linear-gradient(145deg, #141b2b, #1a2233);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: clamp(12px, 1.1vw, 18px);
        }

        .panel-title {
            font-size: clamp(11px, 0.85vw, 13px);
            color: #6677a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: clamp(8px, 0.9vw, 14px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .summary-count {
            color: #00d4ff;
            font-weight: 700;
        }

        .sensor-list-panel {
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sensor-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 380px;
            overflow-y: auto;
        }

        .sensor-list::-webkit-scrollbar {
            width: 5px;
        }
        .sensor-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        .sensor-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: clamp(6px, 0.7vw, 10px) clamp(10px, 0.8vw, 14px);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s;
        }

        .sensor-row.is-active {
            background: rgba(255, 51, 68, 0.08);
            border-color: rgba(255, 51, 68, 0.25);
        }
        .sensor-row.is-offline {
            opacity: 0.4;
            border-color: rgba(255, 255, 255, 0.02);
        }

        .sensor-row-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #1a5a3a;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .sensor-row.is-active .sensor-row-dot {
            background: #ff3344;
            box-shadow: 0 0 10px rgba(255, 51, 68, 0.7);
            animation: pulse-wave 1.8s ease-out infinite;
        }
        .sensor-row.is-offline .sensor-row-dot {
            background: #444;
            box-shadow: none;
        }

        .sensor-row-name {
            font-size: clamp(11px, 0.85vw, 13px);
            color: #c5cfe0;
            flex: 1;
        }
        .sensor-row-status {
            font-size: clamp(10px, 0.75vw, 12px);
            color: #4a8a5a;
            font-weight: 600;
            transition: all 0.3s;
        }
        .sensor-row.is-active .sensor-row-status {
            color: #ff6677;
        }
        .sensor-row.is-offline .sensor-row-status {
            color: #555;
        }
        .sensor-row-coord {
            font-size: clamp(8px, 0.6vw, 10px);
            color: #44557a;
            font-family: 'Courier New', monospace;
        }

        /* ==================== LEGEND ==================== */
        .legend {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: clamp(11px, 0.85vw, 13px);
            color: #8899bb;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-color.idle-color {
            background: #1a5a3a;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        .legend-color.active-color {
            background: #ff3344;
            border: 1px solid rgba(255, 51, 68, 0.5);
            animation: pulse-wave 1.8s ease-out infinite;
        }
        .legend-color.offline-color {
            background: #444;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ==================== LOG ==================== */
        .log-area {
            color: #6a7a9a;
            font-size: clamp(11px, 0.85vw, 13px);
            font-family: 'Courier New', monospace;
            line-height: 1.6;
            min-height: 40px;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-area .log-entry {
            display: block;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .log-area .log-entry .time { color: #44557a; }
        .log-area .log-entry .sensor-name { color: #00d4ff; }
        .log-area .log-entry .status-ok { color: #4a8a5a; }
        .log-area .log-entry .status-motion { color: #ff6677; }
        .log-area .log-entry .status-offline { color: #555; }

        /* ==================== CONTROL PANEL ==================== */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #8899bb;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: clamp(10px, 0.7vw, 12px);
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }
        .btn:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }
        .btn-danger:hover {
            background: rgba(255, 51, 68, 0.15);
            border-color: rgba(255, 51, 68, 0.3);
            color: #ff6677;
        }
        .btn-success:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.2);
            color: #4a8a5a;
        }
        .btn-primary {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
        }
        .btn-primary:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .toggle-grid {
            position: absolute;
            z-index: 20;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #8899bb;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: clamp(10px, 0.7vw, 12px);
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }
        .toggle-grid:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.3);
            color: #00d4ff;
        }
        .toggle-grid .icon { margin-right: 6px; }
        .grid-hidden .grid-bg,
        .grid-hidden .grid-coords { display: none !important; }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto;
            }
            .floorplan-container {
                aspect-ratio: 28233.56 / 40606.29;
                min-height: 50vh;
            }
            .sidebar {
                position: static;
            }
            .sensor-list {
                max-height: 200px;
            }
        }
    </style>
</head>

        // Setiap perangkat memiliki koordinat grid (left%, top%)
        // ================================================================

        // Daftar ruangan yang tersedia dengan koordinat default

            { id: 'dapur', name: 'Dapur', left: 13.5, top: 39.5, room: 'Dapur' },
            { id: 'kamar1', name: 'Kamar 1', left: 9.8, top: 49, room: 'Kamar 1' },

            { id: 'gudang', name: 'Gudang', left: 30.5, top: 49, room: 'Gudang' },
            { id: 'family', name: 'Family', left: 25.5, top: 58, room: 'Family' },
            { id: 'kamar3', name: 'Kamar 3', left: 30.5, top: 56.5, room: 'Kamar 3' },
            { id: 'kamar4', name: 'Kamar 4', left: 38, top: 49, room: 'Kamar 4' },
            { id: 'garasi', name: 'Garasi', left: 43, top: 85, room: 'Garasi' },
            { id: 'teras', name: 'Teras', left: 27, top: 82, room: 'Teras' },
            { id: 'kamar5', name: 'Kamar 5', left: 32, top: 73, room: 'Kamar 5' },
            { id: 'aviary', name: 'Aviary', left: 16.5, top: 29, room: 'Aviary' },
            { id: 'work', name: 'Work', left: 15.5, top: 25, room: 'Work' },
            { id: 'apotek', name: 'Apotek', left: 11, top: 22, room: 'Apotek' },
            { id: 'ekpansi', name: 'Ekpansi Green', left: 10, top: 16, room: 'Ekpansi Green' },
            { id: 'tempat', name: 'Tempat', left: 38.5, top: 52.5, room: 'Tempat' },
            { id: 'laundry', name: 'Laundry', left: 20, top: 40, room: 'Laundry' }
        ];

        // ================================================================
        // STATE PERANGKAT
        // ================================================================
        let devices = [];
        let deviceIdCounter = 0;
        let autoDemoInterval = null;
        let isAutoDemo = true;
        let logEntries = [];
        let eventCounter = 0;

        // ================================================================
        // INISIALISASI - Tambahkan 5 perangkat awal secara acak
        // ================================================================
        function initDevices() {
            // Pilih 5 ruangan acak sebagai perangkat awal
            const shuffled = [...ROOM_TEMPLATES].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, Math.min(5, shuffled.length));

            selected.forEach((template, index) => {
                const isActive = Math.random() > 0.7;
                addDevice(
                    template.id + '-' + (index + 1),
                    template.name,
                    template.left + (Math.random() * 2 - 1),
                    template.top + (Math.random() * 2 - 1),
                    template.room,
                    isActive,
                    false // tidak offline
                );
            });

            updateUI();
            addLog('Sistem', '🔌 ' + devices.length + ' perangkat terpasang', 'info');
        }

        // ================================================================
        // FUNGSI TAMBAH PERANGKAT
        // ================================================================
        function addDevice(id, name, left, top, room, isActive = false, isOffline = false) {
            const device = {
                id: id || 'dev-' + (++deviceIdCounter),
                name: name || 'Sensor ' + (devices.length + 1),
                left: Math.max(0, Math.min(100, left)),
                top: Math.max(0, Math.min(100, top)),
                room: room || name,
                isActive: isActive,
                isOffline: isOffline,
                lastMotion: isActive ? new Date() : null,
                installedAt: new Date()
            };
            devices.push(device);
            return device;
        }

        // ================================================================
        // TAMBAH PERANGKAT BARU (dari tombol)
        // ================================================================
        function addRandomDevice() {
            // Pilih ruangan yang belum terpasang
            const installedRooms = devices.map(d => d.room);
            const available = ROOM_TEMPLATES.filter(r => !installedRooms.includes(r.room));

            if (available.length === 0) {
                addLog('Sistem', '⚠️ Semua ruangan sudah terpasang!', 'info');
                return;
            }

            const template = available[Math.floor(Math.random() * available.length)];
            const isActive = Math.random() > 0.7;

            const device = addDevice(
                template.id + '-' + (devices.length + 1),
                template.name,
                template.left + (Math.random() * 2 - 1),
                template.top + (Math.random() * 2 - 1),
                template.room,
                isActive,
                false
            );

            addLog('Sistem', '➕ Perangkat ' + device.name + ' terpasang di ' + device.room, 'info');
            updateUI();

            // Animasi muncul
            const dot = document.getElementById(device.id);
            if (dot) {
                dot.style.transform = 'translate(-50%, -50%) scale(0)';
                setTimeout(() => {
                    dot.style.transform = 'translate(-50%, -50%) scale(1)';
                }, 50);
            }
        }

        // ================================================================
        // UPDATE VISUAL
        // ================================================================
        function updateUI() {
            renderDots();
            renderList();
            updateCounts();
            updateDeviceCount();
        }

        function renderDots() {
            const container = document.getElementById('floorplan');

            // Hapus semua dot lama (kecuali grid dan tombol)
            container.querySelectorAll('.sensor-dot').forEach(el => el.remove());

            devices.forEach(device => {
                const dot = document.createElement('div');
                dot.className = 'sensor-dot';
                dot.id = device.id;

                if (device.isOffline) {
                    dot.classList.add('offline');
                } else if (device.isActive) {
                    dot.classList.add('active');
                } else {
                    dot.classList.add('idle');
                }

                dot.style.left = device.left + '%';
                dot.style.top = device.top + '%';
                dot.dataset.room = device.room;

                // Tooltip
                const tooltip = document.createElement('span');
                tooltip.className = 'sensor-tooltip';
                tooltip.textContent = device.name + ' (' + device.room + ')';
                dot.appendChild(tooltip);

                // Koordinat
                const coord = document.createElement('span');
                coord.className = 'sensor-coord';
                coord.textContent = device.left.toFixed(1) + '%, ' + device.top.toFixed(1) + '%';
                dot.appendChild(coord);

                // Click handler
                dot.addEventListener('click', () => {
                    toggleDevice(device.id);
                });

                container.appendChild(dot);
            });
        }

        function renderList() {
            const list = document.getElementById('sensorList');
            list.innerHTML = '';

            devices.forEach(device => {
                const row = document.createElement('div');
                row.className = 'sensor-row';
                row.id = device.id + '-row';

                if (device.isOffline) {
                    row.classList.add('is-offline');
                } else if (device.isActive) {
                    row.classList.add('is-active');
                }

                const statusText = device.isOffline ? 'Offline' :
                                   device.isActive ? 'Gerakan' : 'Aman';

                row.innerHTML = `
                    <span class="sensor-row-dot"></span>
                    <span class="sensor-row-name">${device.name}</span>
                    <span class="sensor-row-coord">${device.left.toFixed(1)}%, ${device.top.toFixed(1)}%</span>
                    <span class="sensor-row-status">${statusText}</span>
                `;

                row.addEventListener('click', () => {
                    toggleDevice(device.id);
                });

                list.appendChild(row);
            });
        }

        function updateCounts() {
            const active = devices.filter(d => d.isActive && !d.isOffline).length;
            document.getElementById('activeCount').textContent = active + ' aktif';
        }

        function updateDeviceCount() {
            document.getElementById('deviceCount').textContent = devices.length;
        }

        // ================================================================
        // TOGGLE PERANGKAT (manual click)
        // ================================================================
        function toggleDevice(deviceId) {
            const device = devices.find(d => d.id === deviceId);
            if (!device || device.isOffline) return;

            device.isActive = !device.isActive;
            if (device.isActive) {
                device.lastMotion = new Date();
                addLog(device.name, '🔴 Gerakan terdeteksi!', 'motion');
            } else {
                addLog(device.name, '🟢 Kembali aman', 'ok');
            }

            updateUI();
        }

        // ================================================================
        // SIMULASI GERAKAN RANDOM
        // ================================================================
        function simulateRandomMotion() {
            const onlineDevices = devices.filter(d => !d.isOffline);
            if (onlineDevices.length === 0) {
                addLog('Sistem', '⚠️ Tidak ada perangkat online!', 'info');
                return;
            }

            // Pilih 1-3 perangkat acak
            const count = Math.min(Math.floor(Math.random() * 3) + 1, onlineDevices.length);
            const shuffled = [...onlineDevices].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, count);

            // Reset semua ke idle dulu
            devices.forEach(d => {
                if (!d.isOffline) d.isActive = false;
            });

            // Aktifkan yang terpilih
            selected.forEach(d => {
                d.isActive = true;
                d.lastMotion = new Date();
                addLog(d.name, '🔴 Gerakan terdeteksi!', 'motion');
            });

            updateUI();
        }

        // ================================================================
        // RESET SEMUA PERANGKAT
        // ================================================================
        function resetAllDevices() {
            devices.forEach(d => {
                d.isActive = false;
                d.isOffline = false;
            });
            addLog('Sistem', '🔄 Semua perangkat direset', 'info');
            updateUI();
        }

        // ================================================================
        // AUTO DEMO - Simulasi gerakan periodik
        // ================================================================
        function toggleAutoDemo() {
            isAutoDemo = !isAutoDemo;
            document.getElementById('autoStatus').textContent = isAutoDemo ? 'ON' : 'OFF';

            if (isAutoDemo) {
                startAutoDemo();
                addLog('Sistem', '▶️ Auto demo diaktifkan', 'info');
            } else {
                stopAutoDemo();
                addLog('Sistem', '⏸️ Auto demo dinonaktifkan', 'info');
            }
        }

        function startAutoDemo() {
            if (autoDemoInterval) clearInterval(autoDemoInterval);
            autoDemoInterval = setInterval(() => {
                if (devices.length > 0 && isAutoDemo) {
                    simulateRandomMotion();
                }
            }, 4000);
        }

        function stopAutoDemo() {
            if (autoDemoInterval) {
                clearInterval(autoDemoInterval);
                autoDemoInterval = null;
            }
        }

        // ================================================================
        // LOG ACTIVITY
        // ================================================================
        function addLog(sensorName, message, type) {
            const time = new Date().toLocaleTimeString('id-ID');
            const entry = { time, sensorName, message, type };
            logEntries.unshift(entry);
            if (logEntries.length > 50) logEntries.pop();

            renderLog();
        }

        function renderLog() {
            const logArea = document.getElementById('logArea');
            const statusClassMap = {
                'motion': 'status-motion',
                'ok': 'status-ok',
                'offline': 'status-offline',
                'info': 'status-ok'
            };

            logArea.innerHTML = logEntries.map(entry => {
                const cls = statusClassMap[entry.type] || 'status-ok';
                return `<span class="log-entry">
                    <span class="time">${entry.time}</span>
                    <span class="sensor-name">${entry.sensorName}</span>
                    <span class="${cls}">${entry.message}</span>
                </span>`;
            }).join('');

            document.getElementById('logCount').textContent = logEntries.length;
        }

        // ================================================================
        // TOGGLE GRID
        // ================================================================
        let gridVisible = true;

        function toggleGrid() {
            const container = document.getElementById('floorplan');
            const btn = document.getElementById('toggleGrid');
            gridVisible = !gridVisible;

            if (gridVisible) {
                container.classList.remove('grid-hidden');
                btn.innerHTML = '<span class="icon">▦</span> Sembunyikan Grid';
            } else {
                container.classList.add('grid-hidden');
                btn.innerHTML = '<span class="icon">▦</span> Tampilkan Grid';
            }
        }

        // JAM
        // ================================================================
        function updateClock() {
            document.getElementById('clockTime').textContent = new Date().toLocaleTimeString('id-ID');
        }
